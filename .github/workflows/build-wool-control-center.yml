name: Build Wool Control Center

on:
  workflow_dispatch:
  push:
    paths:
      - 'source/WoolControlCenter/**'
      - '.github/workflows/build-wool-control-center.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Expand source bundle
        run: |
          python3 - <<'PY'
          import base64, io, pathlib, tarfile
          project = pathlib.Path('source/WoolControlCenter')
          payload = base64.b64decode((project / 'project-source.tar.gz.b64').read_text().strip())
          with tarfile.open(fileobj=io.BytesIO(payload), mode='r:gz') as archive:
              archive.extractall(project)
          PY

      - name: Install build dependencies
        run: |
          brew update
          brew install ldid dpkg xz

      - name: Install RootHide Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/roothide/theos/master/bin/install-theos)"

      - name: Build RootHide package
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euo pipefail
          cd source/WoolControlCenter
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide
          find packages -type f -name '*.deb' -print

      - name: Publish package to Sileo repo
        run: |
          set -euo pipefail
          DEB=$(find source/WoolControlCenter/packages -type f -name '*.deb' | head -n 1)
          test -n "$DEB"
          mkdir -p debfiles
          cp "$DEB" debfiles/WoolControlCenter_RootHide_1.0.0_iOS16.deb
          dpkg-scanpackages -m debfiles /dev/null > Packages
          gzip -9c Packages > Packages.gz
          bzip2 -9c Packages > Packages.bz2

          rm -rf source/WoolControlCenter/.theos source/WoolControlCenter/packages
          git config user.name "Next Solution Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add source/WoolControlCenter debfiles/WoolControlCenter_RootHide_1.0.0_iOS16.deb Packages Packages.gz Packages.bz2
          if git diff --cached --quiet; then
            echo "No package changes to publish."
            exit 0
          fi
          git commit -m "Publish Wool Control Center 1.0.0 [skip ci]"
          git push
