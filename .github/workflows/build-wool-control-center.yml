name: Build Wool Control Center RootHide

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "source/WoolControlCenter/**"
      - ".github/workflows/build-wool-control-center.yml"
  pull_request:
    branches:
      - main
    paths:
      - "source/WoolControlCenter/**"
      - ".github/workflows/build-wool-control-center.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Expand source bundle
        run: |
          python3 - <<'PY'
          import base64, io, pathlib, tarfile
          project = pathlib.Path('source/WoolControlCenter')
          payload = base64.b64decode((project / 'project-source.tar.gz.b64').read_text().strip())
          with tarfile.open(fileobj=io.BytesIO(payload), mode='r:gz') as archive:
              archive.extractall(project)
          PY

      - name: Install build dependencies
        run: |
          brew install dpkg ldid >/dev/null
          export THEOS="$HOME/theos"
          git clone --quiet --recursive https://github.com/roothide/theos.git "$THEOS"
          mkdir -p "$THEOS/sdks"
          curl -fsSL --retry 3 \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
            | tar -xJ -C "$THEOS/sdks"

      - name: Build RootHide package
        run: |
          export THEOS="$HOME/theos"
          cd source/WoolControlCenter
          set +e
          make clean > build.log 2>&1
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide >> build.log 2>&1
          STATUS=$?
          tail -n 200 build.log
          exit $STATUS

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Wool-Control-Center-Build-Log
          path: source/WoolControlCenter/build.log
          if-no-files-found: warn

      - name: Upload Wool Control Center deb
        uses: actions/upload-artifact@v4
        with:
          name: Wool-Control-Center-RootHide
          path: source/WoolControlCenter/packages/*.deb
          if-no-files-found: error

      - name: Publish Wool Control Center to Sileo repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          DEB="$(find source/WoolControlCenter/packages -name '*.deb' -type f | head -n 1)"
          VERSION="$(awk '/^Version:/{print $2; exit}' source/WoolControlCenter/control)"
          test -n "$DEB"
          test -n "$VERSION"
          rm -f debfiles/WoolControlCenter_*.deb debfiles/com.nextsolution.woolcontrolcenter_*.deb
          cp "$DEB" "debfiles/WoolControlCenter_${VERSION}_RootHide_iOS16.deb"
          dpkg-scanpackages -m ./debfiles > Packages
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add debfiles Packages Packages.bz2 Packages.gz
          if git diff --cached --quiet; then
            echo "Sileo repo is already current."
            exit 0
          fi
          git commit -m "Publish Wool Control Center RootHide ${VERSION}"
          git push origin HEAD:main
