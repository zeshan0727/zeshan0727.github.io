name: Remove Next Message

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/remove-nextmessage.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install repository tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev bzip2 gzip

      - name: Remove Next Message and rebuild indexes
        run: |
          set -euxo pipefail
          rm -f debfiles/NextMessage_*.deb debfiles/com.nextsolution.nextmessage_*.deb
          dpkg-scanpackages -m ./debfiles > Packages
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz
          if grep -q '^Package: com.nextsolution.nextmessage$' Packages; then
            echo 'Next Message still exists in Packages'
            exit 1
          fi

      - name: Commit removal
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A debfiles Packages Packages.bz2 Packages.gz
          if git diff --cached --quiet; then
            echo 'Next Message is already absent.'
            exit 0
          fi
          git commit -m 'Remove Next Message from Sileo repo'
          git push origin HEAD:main
