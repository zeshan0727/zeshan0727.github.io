name: Export Wool Control Center Source

on:
  push:
    branches:
      - wcc-module-customizer-v1.2.0
    paths:
      - ".github/workflows/wcc-export-source.yml"
      - "source/WoolControlCenter/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/wcc-export-source.yml"
      - "source/WoolControlCenter/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Expand current source
        run: |
          python3 - <<'PY'
          import base64, pathlib
          project = pathlib.Path('source/WoolControlCenter')
          parts = sorted((project / 'source-parts').glob('part-*'))
          encoded = ''.join(part.read_text().strip() for part in parts)
          payload = base64.b64decode(encoded, validate=True)
          pathlib.Path('/tmp/WoolControlCenter-source.tar.gz').write_bytes(payload)
          PY
          tar -xzf /tmp/WoolControlCenter-source.tar.gz -C source/WoolControlCenter
          find source/WoolControlCenter -maxdepth 3 -type f -print

      - name: Upload expanded source
        uses: actions/upload-artifact@v4
        with:
          name: Wool-Control-Center-Expanded-Source
          path: |
            source/WoolControlCenter/Makefile
            source/WoolControlCenter/Tweak.x
            source/WoolControlCenter/control
            source/WoolControlCenter/WoolControlCenter.plist
            source/WoolControlCenter/Preferences/**
            source/WoolControlCenter/layout/**
          if-no-files-found: error
