name: Build PhoneAura RootHide

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - phoneaura-v0.1
    paths:
      - "source/PhoneAura/**"
      - ".github/workflows/build-phoneaura.yml"
  pull_request:
    branches:
      - main
    paths:
      - "source/PhoneAura/**"
      - ".github/workflows/build-phoneaura.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install dpkg ldid >/dev/null
          export THEOS="$HOME/theos"
          git clone --quiet --recursive https://github.com/roothide/theos.git "$THEOS"
          mkdir -p "$THEOS/sdks"
          curl -fsSL --retry 3 \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
            | tar -xJ -C "$THEOS/sdks"

      - name: Build RootHide package
        run: |
          export THEOS="$HOME/theos"
          cd source/PhoneAura
          set +e
          make clean > build.log 2>&1
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide >> build.log 2>&1
          STATUS=$?
          tail -n 140 build.log
          exit $STATUS

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-Build-Log
          path: source/PhoneAura/build.log
          if-no-files-found: warn

      - name: Upload PhoneAura deb
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-RootHide
          path: source/PhoneAura/packages/*.deb
          if-no-files-found: error

      - name: Publish PhoneAura to Sileo repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          DEB="$(find source/PhoneAura/packages -name '*.deb' -type f | head -n 1)"
          test -n "$DEB"
          rm -f debfiles/PhoneAura_*.deb debfiles/com.zeshan.phoneaura_*.deb
          cp "$DEB" debfiles/PhoneAura_0.2.0_RootHide_iOS16.deb
          dpkg-scanpackages -m ./debfiles > Packages
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add debfiles Packages Packages.bz2 Packages.gz
          if git diff --cached --quiet; then
            echo "Sileo repo is already current."
            exit 0
          fi
          git commit -m "Publish PhoneAura RootHide 0.2.0"
          git push origin HEAD:main
