name: Build PhoneAura RootHide and Rootless

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "source/PhoneAura/**"
      - ".github/workflows/build-phoneaura.yml"
  pull_request:
    branches:
      - main
    paths:
      - "source/PhoneAura/**"
      - ".github/workflows/build-phoneaura.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies and toolchains
        run: |
          brew install dpkg ldid >/dev/null

          git clone --quiet --recursive https://github.com/roothide/theos.git "$HOME/theos-roothide"
          git clone --quiet --recursive https://github.com/theos/theos.git "$HOME/theos-rootless"

          for THEOS_DIR in "$HOME/theos-roothide" "$HOME/theos-rootless"; do
            mkdir -p "$THEOS_DIR/sdks"
            curl -fsSL --retry 3 \
              https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
              | tar -xJ -C "$THEOS_DIR/sdks"
          done

      - name: Build RootHide package
        run: |
          set -o pipefail
          export THEOS="$HOME/theos-roothide"
          mkdir -p "$GITHUB_WORKSPACE/release"
          cd source/PhoneAura
          cp control.roothide control
          rm -rf packages .theos
          make clean >/dev/null 2>&1 || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide 2>&1 | tee build-roothide.log

          DEB="$(find packages -name '*.deb' -type f | head -n 1)"
          test -n "$DEB"
          test "$(dpkg-deb -f "$DEB" Architecture)" = "iphoneos-arm64e"
          VERSION="$(dpkg-deb -f "$DEB" Version)"
          cp "$DEB" "$GITHUB_WORKSPACE/release/PhoneAura_${VERSION}_RootHide_iOS16.deb"
          dpkg-deb -f "$DEB" Package Version Architecture | tee -a build-roothide.log

      - name: Build rootless package
        run: |
          set -o pipefail
          export THEOS="$HOME/theos-rootless"
          cd source/PhoneAura
          cp control.rootless control
          rm -rf packages .theos
          make clean >/dev/null 2>&1 || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1 | tee build-rootless.log

          DEB="$(find packages -name '*.deb' -type f | head -n 1)"
          test -n "$DEB"
          test "$(dpkg-deb -f "$DEB" Architecture)" = "iphoneos-arm64"
          VERSION="$(dpkg-deb -f "$DEB" Version)"
          cp "$DEB" "$GITHUB_WORKSPACE/release/PhoneAura_${VERSION}_Rootless_iOS16.deb"
          dpkg-deb -f "$DEB" Package Version Architecture | tee -a build-rootless.log

      - name: Upload RootHide build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-RootHide-Build-Log
          path: source/PhoneAura/build-roothide.log
          if-no-files-found: warn

      - name: Upload rootless build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-Rootless-Build-Log
          path: source/PhoneAura/build-rootless.log
          if-no-files-found: warn

      - name: Upload RootHide package
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-RootHide
          path: release/*_RootHide_iOS16.deb
          if-no-files-found: error

      - name: Upload rootless package
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-Rootless
          path: release/*_Rootless_iOS16.deb
          if-no-files-found: error

      - name: Publish both PhoneAura variants to Sileo repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION="$(awk '/^Version:/{print $2; exit}' source/PhoneAura/control.roothide)"
          test -n "$VERSION"
          test -f "release/PhoneAura_${VERSION}_RootHide_iOS16.deb"
          test -f "release/PhoneAura_${VERSION}_Rootless_iOS16.deb"

          rm -f debfiles/PhoneAura_*.deb debfiles/com.zeshan.phoneaura_*.deb
          cp "release/PhoneAura_${VERSION}_RootHide_iOS16.deb" debfiles/
          cp "release/PhoneAura_${VERSION}_Rootless_iOS16.deb" debfiles/

          dpkg-scanpackages -m ./debfiles > Packages
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add debfiles Packages Packages.bz2 Packages.gz
          if git diff --cached --quiet; then
            echo "Sileo repo is already current."
            exit 0
          fi
          git commit -m "Publish PhoneAura ${VERSION} RootHide and rootless"
          git push origin HEAD:main
