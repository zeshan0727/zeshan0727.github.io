name: Build PhoneAura RootHide and Rootless

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "source/PhoneAura/**"
      - ".github/workflows/build-phoneaura.yml"
  pull_request:
    branches:
      - main
    paths:
      - "source/PhoneAura/**"
      - ".github/workflows/build-phoneaura.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install dpkg ldid >/dev/null
          export THEOS="$HOME/theos"
          git clone --quiet --recursive https://github.com/roothide/theos.git "$THEOS"
          mkdir -p "$THEOS/sdks"
          curl -fsSL --retry 3 \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
            | tar -xJ -C "$THEOS/sdks"

      - name: Build RootHide and rootless packages
        run: |
          export THEOS="$HOME/theos"
          mkdir -p release
          cd source/PhoneAura
          : > build.log

          build_variant() {
            SCHEME="$1"
            CONTROL_FILE="$2"
            LABEL="$3"
            EXPECTED_ARCH="$4"

            echo "===== Building ${LABEL} (${SCHEME}) =====" | tee -a build.log
            cp "$CONTROL_FILE" control
            rm -rf packages .theos
            make clean >> build.log 2>&1 || true
            make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME="$SCHEME" >> build.log 2>&1

            DEB="$(find packages -name '*.deb' -type f | head -n 1)"
            test -n "$DEB"
            ACTUAL_ARCH="$(dpkg-deb -f "$DEB" Architecture)"
            test "$ACTUAL_ARCH" = "$EXPECTED_ARCH"

            VERSION="$(dpkg-deb -f "$DEB" Version)"
            cp "$DEB" "../../release/PhoneAura_${VERSION}_${LABEL}_iOS16.deb"
            echo "Built ${LABEL}: version=${VERSION}, architecture=${ACTUAL_ARCH}" | tee -a build.log
          }

          build_variant roothide control.roothide RootHide iphoneos-arm64e
          build_variant rootless control.rootless Rootless iphoneos-arm64
          tail -n 220 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-Build-Log
          path: source/PhoneAura/build.log
          if-no-files-found: warn

      - name: Upload RootHide package
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-RootHide
          path: release/*_RootHide_iOS16.deb
          if-no-files-found: error

      - name: Upload rootless package
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAura-Rootless
          path: release/*_Rootless_iOS16.deb
          if-no-files-found: error

      - name: Publish both PhoneAura variants to Sileo repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION="$(awk '/^Version:/{print $2; exit}' source/PhoneAura/control.roothide)"
          test -n "$VERSION"
          test -f "release/PhoneAura_${VERSION}_RootHide_iOS16.deb"
          test -f "release/PhoneAura_${VERSION}_Rootless_iOS16.deb"

          rm -f debfiles/PhoneAura_*.deb debfiles/com.zeshan.phoneaura_*.deb
          cp "release/PhoneAura_${VERSION}_RootHide_iOS16.deb" debfiles/
          cp "release/PhoneAura_${VERSION}_Rootless_iOS16.deb" debfiles/

          dpkg-scanpackages -m ./debfiles > Packages
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add debfiles Packages Packages.bz2 Packages.gz
          if git diff --cached --quiet; then
            echo "Sileo repo is already current."
            exit 0
          fi
          git commit -m "Publish PhoneAura ${VERSION} RootHide and rootless"
          git push origin HEAD:main
