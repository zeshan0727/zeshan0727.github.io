name: Build Unlock Vibrate RootHide

on:
  workflow_dispatch:
  push:
    paths:
      - "source/UnlockVibrate/**"
      - ".github/workflows/build-unlockvibrate.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install dpkg ldid
          export THEOS="$HOME/theos"
          git clone --recursive https://github.com/roothide/theos.git "$THEOS"
          mkdir -p "$THEOS/sdks"
          curl -fL --retry 3 \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
            | tar -xJ -C "$THEOS/sdks"

      - name: Build RootHide package
        run: |
          export THEOS="$HOME/theos"
          cd source/UnlockVibrate
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide

      - name: Publish package and rebuild index
        run: |
          DEB="$(find source/UnlockVibrate/packages -name '*.deb' -type f | head -n 1)"
          test -n "$DEB"
          rm -f debfiles/UnlockVibrate_RootHide_1.3.0_iOS16.deb
          cp "$DEB" debfiles/UnlockVibrate_RootHide_1.4.0_iOS16.deb
          dpkg-scanpackages -m ./debfiles > Packages
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add debfiles Packages Packages.bz2 Packages.gz
          git commit -m "Publish Unlock Vibrate RootHide 1.4.0"
          git push
